<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>貨態狀況</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../css/style.css">

  <style>
    body{
      margin:0;
      background:
        radial-gradient(circle at top left, #fff4ea 0%, #fff9f5 36%, #ffffff 74%);
      color:#4f433c;
      font-family:"Segoe UI","Microsoft JhengHei",sans-serif;
    }

    .tracking-page{
      max-width:1080px;
      margin:40px auto 64px;
      padding:0 20px;
    }

    .tracking-hero{
      position:relative;
      overflow:hidden;
      background:linear-gradient(135deg,#ffbe7a 0%, #ff9e58 55%, #ff7f11 100%);
      border-radius:32px;
      padding:42px 30px 26px;
      margin-bottom:24px;
      color:#fff;
      box-shadow:0 18px 40px rgba(255,127,17,0.18);
    }

    .tracking-hero::before{
      content:"";
      position:absolute;
      width:230px;
      height:230px;
      border-radius:50%;
      background:rgba(255,255,255,0.14);
      top:-80px;
      right:-45px;
    }

    .tracking-hero::after{
      content:"";
      position:absolute;
      width:150px;
      height:150px;
      border-radius:50%;
      background:rgba(255,255,255,0.10);
      left:-30px;
      bottom:-45px;
    }

    .tracking-hero > *{
      position:relative;
      z-index:1;
    }

    .hero-badge{
      display:inline-block;
      padding:8px 14px;
      border-radius:999px;
      background:rgba(255,255,255,0.18);
      border:1px solid rgba(255,255,255,0.28);
      font-size:13px;
      font-weight:700;
      margin-bottom:12px;
    }

    .tracking-hero h2{
      margin:0 0 10px;
      font-size:36px;
      font-weight:800;
      letter-spacing:0.5px;
    }

    .tracking-hero p{
      margin:0;
      font-size:15px;
      line-height:1.9;
      max-width:780px;
      color:rgba(255,255,255,0.96);
    }

    .hero-meta{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:18px;
    }

    .meta-pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:9px 14px;
      border-radius:999px;
      background:rgba(255,255,255,0.18);
      border:1px solid rgba(255,255,255,0.28);
      color:#fffefc;
      font-size:14px;
      font-weight:700;
    }

    .hero-note{
      margin-top:16px;
      background:rgba(255,255,255,0.16);
      border:1px solid rgba(255,255,255,0.25);
      border-left:6px solid #fff0d8;
      color:#fffaf2;
      border-radius:18px;
      padding:14px 16px;
      line-height:1.85;
      font-size:14px;
      font-weight:700;
    }

    .tracking-list{
      display:grid;
      gap:18px;
    }

    .stage-card{
      border-radius:24px;
      padding:18px;
      box-shadow:0 10px 24px rgba(0,0,0,0.05);
      border:1px solid rgba(120,95,75,0.06);
      position:relative;
      overflow:hidden;
    }

    .stage-card::before{
      content:"";
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:7px;
      background:rgba(255,255,255,0.55);
    }

    .stage-head{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:14px;
    }

    .stage-icon{
      width:38px;
      height:38px;
      border-radius:14px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:18px;
      background:rgba(255,255,255,0.68);
      box-shadow:0 6px 14px rgba(0,0,0,0.04);
    }

    .stage-no{
      width:28px;
      height:28px;
      border-radius:10px;
      background:linear-gradient(135deg,#ffb36b,#ff8b3d);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:14px;
      font-weight:800;
      box-shadow:0 6px 12px rgba(255,138,61,0.18);
    }

    .stage-title{
      font-size:22px;
      font-weight:800;
      color:#3f352f;
    }

    .item-list{
      display:grid;
      gap:10px;
    }

    .tracking-item{
      background:rgba(255,255,255,0.72);
      border:1px solid rgba(255,255,255,0.88);
      border-radius:18px;
      padding:14px 16px;
      line-height:1.85;
      font-size:15px;
      color:#4b4039;
      box-shadow:0 4px 10px rgba(0,0,0,0.02);
    }

    .tracking-empty{
      background:rgba(255,255,255,0.54);
      border:1px dashed rgba(120,100,85,0.20);
      border-radius:18px;
      padding:14px 16px;
      line-height:1.8;
      font-size:15px;
      color:#7a6558;
    }

    .stage-1{
      background:linear-gradient(180deg,#fff0ea 0%, #fff6f2 100%);
      border-left:6px solid #f3b2a2;
    }

    .stage-2{
      background:linear-gradient(180deg,#fff4ea 0%, #fff8f3 100%);
      border-left:6px solid #f2bb8d;
    }

    .stage-3{
      background:linear-gradient(180deg,#fff7ee 0%, #fffaf6 100%);
      border-left:6px solid #f3c77a;
    }

    .stage-4{
      background:linear-gradient(180deg,#fff3ed 0%, #fff8f5 100%);
      border-left:6px solid #f0b29a;
    }

    .stage-5{
      background:linear-gradient(180deg,#fff6ef 0%, #fffaf7 100%);
      border-left:6px solid #efb788;
    }

    .stage-6{
      background:linear-gradient(180deg,#fff1eb 0%, #fff7f4 100%);
      border-left:6px solid #e9a88e;
    }

    .site-footer{
      text-align:center;
      color:#9a8576;
      font-size:14px;
      margin-top:28px;
      padding-bottom:10px;
    }

    @media (max-width:768px){
      .tracking-page{
        margin:24px auto 40px;
        padding:0 14px;
      }

      .tracking-hero{
        padding:24px 16px 18px;
        border-radius:22px;
      }

      .tracking-hero h2{
        font-size:27px;
      }

      .stage-card{
        padding:14px;
        border-radius:18px;
      }

      .stage-title{
        font-size:18px;
      }

      .tracking-item,
      .tracking-empty{
        font-size:14px;
        padding:12px 13px;
        border-radius:14px;
      }

      .hero-meta{
        gap:8px;
      }

      .meta-pill{
        font-size:13px;
        padding:8px 12px;
      }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <img src="../LOGO.png" class="brand-logo" alt="THAI BUY logo">
    <div>
      <div class="brand-title">THAI BUY</div>
      <div class="brand-subtitle">泰國代購</div>
    </div>
  </div>

  <div class="topbar-nav">
    <a href="./index.html" class="topbar-link">商品頁</a>
    <a href="./order-query.html" class="topbar-link">訂單查詢</a>
    <a href="./notice.html" class="topbar-link">購物須知</a>
    <a href="./tracking.html" class="topbar-link active">貨態狀況</a>
    <a href="./shipping.html" class="topbar-link">運送須知</a>
    <a href="./contact.html" class="topbar-link">聯繫方式</a>
    <a href="./news.html" class="topbar-link">最新活動</a>
  </div>
</div>

<div class="tracking-page">

  <div class="tracking-hero">
    <div class="hero-badge">THAI BUY 貨態公告</div>
    <h2>貨態狀況</h2>
    <p>
      這裡會公告各系列目前的整體進度，包含官方是否出貨、是否已到集運倉、
      是否準備打包回台、是否抵台清關，以及我方後續點貨與開單進度。
    </p>

    <div class="hero-meta">
      <div class="meta-pill" id="lastUpdated">🕒 最後更新：--</div>
      <div class="meta-pill">📌 不定期更新</div>
    </div>

    <div class="hero-note">
      ※ 若本頁尚未更新，不代表商品異常，請耐心等候；最新進度皆以此頁公告為主。
    </div>
  </div>

  <div class="tracking-list">

    <section class="stage-card stage-1">
      <div class="stage-head">
        <div class="stage-icon">🇹🇭</div>
        <div class="stage-no">1</div>
        <div class="stage-title">官方未出貨</div>
      </div>
      <div class="item-list" id="stage-official_pending"></div>
    </section>

    <section class="stage-card stage-2">
      <div class="stage-head">
        <div class="stage-icon">📦</div>
        <div class="stage-no">2</div>
        <div class="stage-title">已到集運倉</div>
      </div>
      <div class="item-list" id="stage-warehouse"></div>
    </section>

    <section class="stage-card stage-3">
      <div class="stage-head">
        <div class="stage-icon">✈️</div>
        <div class="stage-no">3</div>
        <div class="stage-title">準備打包回台</div>
      </div>
      <div class="item-list" id="stage-packing"></div>
    </section>

    <section class="stage-card stage-4">
      <div class="stage-head">
        <div class="stage-icon">🛃</div>
        <div class="stage-no">4</div>
        <div class="stage-title">已抵台，等待清關</div>
      </div>
      <div class="item-list" id="stage-customs"></div>
    </section>

    <section class="stage-card stage-5">
      <div class="stage-head">
        <div class="stage-icon">✅</div>
        <div class="stage-no">5</div>
        <div class="stage-title">我方點貨中</div>
      </div>
      <div class="item-list" id="stage-checking"></div>
    </section>

    <section class="stage-card stage-6">
      <div class="stage-head">
        <div class="stage-icon">🎁</div>
        <div class="stage-no">6</div>
        <div class="stage-title">已打包完成，等待客人下單中</div>
      </div>
      <div class="item-list" id="stage-ready_to_order"></div>
    </section>

  </div>

  <footer class="site-footer">© ThaiBuy代購</footer>

</div>

<script type="module" src="../js/tracking.js"></script>
</body>
</html>
