<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>商品管理</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/admin-products.css">
</head>

<body>

<div class="topbar">
  <div class="topbar-left">
    <img src="../LOGO.png" class="brand-logo" alt="THAI BUY logo">
    <div>
      <div class="brand-title">THAI BUY</div>
      <div class="brand-subtitle">可愛又安心的泰國代購</div>
    </div>
  </div>

  <div class="topbar-nav">
    <a href="./admin-orders.html" class="topbar-link">訂單管理</a>
    <a href="./admin-product-stats.html" class="topbar-link">商品統計</a>
    <a href="./admin-products.html" class="topbar-link active">商品管理</a>
    <a href="./admin-tracking.html" class="topbar-link">貨態管理</a>
    <a href="./admin-711.html" class="topbar-link">賣貨便管理</a>
    <a href="./admin-settlement.html" class="topbar-link">帳務管理</a>
    <a href="./admin-expenses.html" class="topbar-link">內帳支出</a>
    <a href="./admin-wallet.html" class="topbar-link">儲值金管理</a>
    <a href="./admin-711-income.html" class="topbar-link">7-11入帳</a>
    <a href="./admin-self-usage.html" class="topbar-link">自用紀錄</a>
  </div>
</div>

<div class="container">

  <!-- 商品新增 -->
  <div class="card product-form-card">
  <div class="card-header-row">
    <h2 id="formTitle">🛍 新增商品</h2>
    <button type="button" class="btn-primary" id="toggleProductFormBtn" onclick="toggleProductForm()">
      ＋新增商品
    </button>
  </div>

  <div id="productFormWrap" class="form-collapsed">

    <div class="form-section">
      <div class="form-section-title">基本資料</div>
      <div class="form-grid-2">
        <div class="field">
          <label>上架日期</label>
          <input type="date" id="release_date">
        </div>

        <div class="field">
          <label>商品名稱</label>
          <input id="name" placeholder="例如：寫真書">
        </div>

        <div class="field full">
          <label>商品系列</label>
          <div class="inline-row">
            <select id="series_id">
              <option value="">請選擇系列</option>
            </select>
            <button type="button" class="btn-secondary add-series-btn" onclick="createSeries()">＋新增系列</button>
          </div>
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title">販售設定</div>
      <div class="form-grid-4">
        <div class="field">
          <label>上架狀態</label>
          <select id="is_active">
            <option value="true">上架中</option>
            <option value="false">下架</option>
          </select>
        </div>

        <div class="field">
          <label>預購類型</label>
          <select id="preorder_type" onchange="toggleDepositFields()">
            <option value="instock">現貨</option>
            <option value="normal">一般預購</option>
            <option value="limited">限量預購</option>
          </select>
        </div>

        <div class="field">
          <label>付款方式</label>
          <select id="payment_method">
            <option value="">請選擇付款方式</option>
            <option value="銀行轉帳／LINE PAY">銀行轉帳／LINE PAY</option>
            <option value="銀行轉帳">銀行轉帳</option>
            <option value="LINE PAY">LINE PAY</option>
          </select>
        </div>

        <div class="field">
          <label>運送方式</label>
          <select id="shipping_method">
            <option value="">請選擇運送方式</option>
            <option value="賣貨便／交貨便">賣貨便／交貨便</option>
            <option value="賣貨便">賣貨便</option>
            <option value="交貨便">交貨便</option>
            <option value="郵寄">郵寄</option>
            <option value="黑貓">黑貓</option>
            <option value="其他">其他</option>
          </select>
        </div>
      </div>

      <div id="depositBlock" class="deposit-block" style="display:none;">
        <div class="form-grid-2">
          <div class="field">
            <label>是否需要訂金</label>
            <select id="deposit_required" onchange="toggleDepositAmount()">
              <option value="false">否</option>
              <option value="true">是</option>
            </select>
          </div>

          <div class="field" id="depositAmountWrap" style="display:none;">
            <label>訂金金額</label>
            <input type="number" id="deposit_amount" min="0" value="500" placeholder="例如：500">
          </div>
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title">商品內容</div>
      <div class="form-grid-1">
        <div class="field">
          <label>商品描述</label>
          <textarea id="desc" placeholder="商品介紹"></textarea>
        </div>

        <div class="field">
          <label>預購說明</label>
          <textarea id="preorder_note" placeholder="例如：預計收單時間、到貨時間、注意事項"></textarea>
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title">商品圖片</div>
      <div class="form-grid-1">
        <div class="field">
          <label>商品圖片</label>
          <input type="file" id="images" multiple onchange="previewImages()">
        </div>
      </div>

      <div id="preview" class="preview-grid"></div>
    </div>

    <div class="form-section">
  <div class="form-section-title">規格設定</div>

  <div id="variants"></div>

  <div class="variant-add-wrap">
    <button type="button" class="btn-secondary" onclick="addVariant()">＋新增規格</button>
  </div>
</div>

    <div class="form-actions">
      <button type="button" class="btn-cancel" id="cancelEditBtn" onclick="cancelEdit()" style="display:none;">取消編輯</button>
      <button type="button" class="btn-primary" id="submitBtn" onclick="saveProduct()">送出商品</button>
    </div>
  </div>
</div>
  <!-- 商品列表 -->
 <div class="card product-list-card">
    <h3>商品列表</h3>

    <div class="product-toolbar">
      <input
        id="searchKeyword"
        placeholder="搜尋商品名稱 / 描述 / 規格"
      >

      <select id="searchSeries">
        <option value="">全部系列</option>
      </select>

      <select id="searchStatus">
        <option value="">全部狀態</option>
        <option value="true">上架中</option>
        <option value="false">已下架</option>
      </select>

      <button type="button" class="btn-secondary" onclick="loadProducts()">搜尋</button>
    </div>

    <div id="productList"></div>
  </div>

  <footer class="site-footer">2025 © ThaiBuy代購</footer>
</div>

<script type="module" src="../js/admin-products.js"></script>
</body>
</html>
