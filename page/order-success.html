<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>訂單完成</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body style="background:#f8f8f8;">

  <div class="topbar">
    <div class="topbar-left">
      <img src="../LOGO.png" class="brand-logo" alt="THAI BUY logo">
      <div>
        <div class="brand-title">THAI BUY</div>
        <div class="brand-subtitle">可愛又安心的泰國代購</div>
      </div>
    </div>
  </div>

  <div style="max-width:720px;margin:60px auto;padding:20px;">
    <div style="background:#fff;border-radius:18px;padding:32px 24px;box-shadow:0 8px 30px rgba(0,0,0,0.08);text-align:center;">
      <div style="font-size:42px;margin-bottom:10px;">🎉</div>
      <h1 style="margin:0 0 16px 0;font-size:28px;">訂單送出成功</h1>

      <p style="font-size:16px;color:#555;margin-bottom:10px;">
        請記下你的訂單編號：
      </p>

      <div id="orderNumberBox"
           style="margin:20px auto;padding:18px 20px;border-radius:14px;background:#fff7f3;border:2px dashed #ff7a3d;font-size:30px;font-weight:bold;color:#ff6b35;letter-spacing:1px;">
      </div>

      <p style="font-size:14px;color:#666;line-height:1.8;margin-top:18px;">
        後續查詢訂單、聯繫客服時，可提供此編號。
      </p>

      <div style="margin-top:28px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
        <button onclick="copyOrderNumber()"
                style="padding:12px 20px;border:none;border-radius:10px;background:#ff6b35;color:#fff;font-size:15px;cursor:pointer;">
          複製訂單編號
        </button>

        <a href="./index.html"
           style="display:inline-block;padding:12px 20px;border-radius:10px;background:#eee;color:#333;text-decoration:none;font-size:15px;">
          回首頁
        </a>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search)
    const orderNumber = params.get("orderNumber") || "查無訂單編號"

    document.getElementById("orderNumberBox").textContent = orderNumber

    function copyOrderNumber(){
      navigator.clipboard.writeText(orderNumber)
      alert("訂單編號已複製")
    }
  </script>

</body>
</html>
