<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>帳務管理</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/admin-settlement.css">
</head>

<body>

<div class="topbar">
  <div class="topbar-left">
    <img src="../LOGO.png" class="brand-logo" alt="THAI BUY logo">
    <div>
      <div class="brand-title">THAI BUY</div>
      <div class="brand-subtitle">可愛又安心的泰國代購</div>
    </div>
  </div>

  <div class="topbar-nav">
    <a href="./admin-orders.html" class="topbar-link">訂單管理</a>
    <a href="./admin-product-stats.html" class="topbar-link">商品統計</a>
    <a href="./admin-products.html" class="topbar-link">商品管理</a>
    <a href="./admin-tracking.html" class="topbar-link">貨態管理</a>
    <a href="./admin-711.html" class="topbar-link">賣貨便管理</a>
    <a href="./admin-settlement.html" class="topbar-link active">帳務管理</a>
    <a href="./admin-expenses.html" class="topbar-link">內帳支出</a>
    <a href="./admin-wallet.html" class="topbar-link">儲值金管理</a>
    <a href="./admin-711-income.html" class="topbar-link">7-11入帳</a>
    <a href="./admin-self-usage.html" class="topbar-link">自用紀錄</a>
  </div>
</div>

<div class="container">

    <!-- 批次主資料 -->
  <div class="card">
    <div class="card-header-row">
      <h2 id="batchFormTitle">新增帳務批次</h2>
      <button type="button" class="btn-primary" id="toggleBatchFormBtn" onclick="toggleBatchForm()">
  ＋新增批次
</button>
    </div>

    <div id="batchFormWrap" class="form-collapsed">

    <div class="form-section">
      <div class="form-section-title">基本資料</div>
      <div class="form-grid">
        <div class="field">
          <label>批次日期</label>
          <input type="date" id="batch_date">
        </div>

        <div class="field">
          <label>批次名稱</label>
          <input type="text" id="batch_name" placeholder="例如：泰國_2026-04-05_AW_PMG系列_01">
        </div>

        <div class="field">
          <label>購買來源</label>
          <input type="text" id="purchase_source" placeholder="例如：賴商店 / 官網 / 線下">
        </div>

        <div class="field">
          <label>官方訂單編號</label>
          <input type="text" id="official_order_no" placeholder="例如：官網訂單編號 / 平台訂單編號">
        </div>

        <div class="field full">
          <label>貨態編號</label>
          <input type="text" id="cargo_no" placeholder="例如：物流單號 / 集運單號">
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title">物流狀態</div>
      <div class="form-grid">
        <div class="field">
          <label>入庫狀態</label>
          <select id="stock_status">
            <option value="pending">未入庫</option>
            <option value="in_transit">運送中</option>
            <option value="arrived">已到貨未入庫</option>
            <option value="stocked">已入庫</option>
          </select>
        </div>

        <div class="field">
          <label>是否已打包回台</label>
          <select id="packed_status">
            <option value="false">否</option>
            <option value="true">是</option>
          </select>
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title">付款資訊</div>
      <div class="form-grid-4">
        <div class="field">
          <label>刷卡人</label>
          <select id="payer_name">
            <option value="">請選擇刷卡人</option>
            <option value="青">青</option>
            <option value="媛媛">媛媛</option>
            <option value="夥伴B">夥伴B</option>
          </select>
        </div>

        <div class="field">
          <label>銀行</label>
          <select id="bank_name">
            <option value="">請選擇銀行</option>
            <option value="台新">台新</option>
            <option value="國泰">國泰</option>
            <option value="聯邦">聯邦</option>
            <option value="中信">中信</option>
            <option value="玉山">玉山</option>
          </select>
        </div>

       <div class="field">
  <label>卡號五碼</label>
  <select id="card_name">
    <option value="">請選擇卡號五碼</option>
    <option value="86902">86902</option>
    <option value="47278">47278</option>
    <option value="41599">41599</option>
    <option value="08001">08001</option>
    <option value="31307">31307</option>
    <option value="06374">06374</option>
    <option value="69104">69104</option>
    <option value="40965">40965</option>
  </select>
</div>
        <div class="field">
          <label>幣別</label>
          <select id="currency">
            <option value="TWD">TWD</option>
            <option value="THB">THB</option>
            <option value="CNY">CNY</option>
            <option value="KRW">KRW</option>
            <option value="JPY">JPY</option>
            <option value="USD">USD</option>
          </select>
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title">金額資訊</div>
      <div class="form-grid-4">
        <div class="field">
          <label>原訂單總金額</label>
          <input type="number" id="amount_original" step="0.01" value="0">
        </div>

        <div class="field">
          <label>台幣出帳金額 (不含刷卡手續費)</label>
          <input type="number" id="amount_twd_final" step="0.01" value="0">
        </div>

        <div class="field">
          <label>刷卡手續費</label>
          <input type="number" id="card_fee" step="0.01" value="0">
        </div>

        <div class="field">
          <label>匯率（自動計算）</label>
          <input type="number" id="exchange_rate" step="0.0001" value="0" readonly>
        </div>

        <div class="field">
          <label>當地運費（已含在刷卡金額內，僅記錄）</label>
          <input type="number" id="local_shipping" step="0.01" value="0">
        </div>

        <div class="field">
  <label>每公斤國際運費</label>
  <input type="number" id="shipping_per_kg" step="0.01" value="160">
</div>


        <div class="field">
          <label>回饋比例（例如 0.02）</label>
          <input type="number" id="reward_rate" step="0.0001" value="0">
        </div>

        <div class="field">
          <label>回饋金額（自動計算，可手改）</label>
          <input type="number" id="reward_amount" step="0.01" value="0">
        </div>

        <div class="field">
          <label>是否已抵用</label>
          <select id="is_reward_used">
            <option value="false">否</option>
            <option value="true">是</option>
          </select>
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title">備註</div>
      <div class="form-grid">
        <div class="field full">
          <label>備註</label>
          <textarea id="batch_note"></textarea>
        </div>
      </div>
    </div>

    <div class="form-actions">
      <button type="button" class="btn-primary" onclick="saveBatch()">建立批次</button>
    </div>
  </div>
  </div>
    <!-- 加入批次商品 -->
  <div class="card" id="itemFormCard">
    <div class="card-header-row">
      <h2 id="itemFormTitle">加入批次商品</h2>
      <button type="button" class="btn-primary" id="toggleItemFormBtn" onclick="toggleItemForm()">
  ＋新增批次商品
</button>
    </div>

    <div id="itemFormWrap" class="form-collapsed">

    <div class="form-section">
      <div class="form-section-title">商品選擇</div>
      <div class="form-grid-3">
        <div class="field">
          <label>選擇批次</label>
          <div class="batch-select-wrap">
  <input type="text" id="batch_search_input" placeholder="搜尋批次..." autocomplete="off">
  <div id="batch_dropdown" class="batch-dropdown"></div>
</div>

<!-- 原本的 select 保留（但隱藏） -->
<select id="batch_select" style="display:none;"></select>
        </div>

      <div class="field">
  <label>商品</label>

  <div class="product-select-wrap">
    <input type="text" id="product_search_input" placeholder="搜尋商品..." autocomplete="off">
    <div id="product_dropdown" class="product-dropdown"></div>
  </div>

  <select id="product_select" onchange="loadVariantsForSettlement()" style="display:none;">
    <option value="">請先選商品</option>
  </select>
</div>

        <div class="field">
          <label>規格</label>
          <select id="variant_select">
            <option value="">請先選規格</option>
          </select>
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title">成本與售價</div>
      <div class="form-grid-4">
        <div class="field">
          <label>購買數量</label>
          <input type="number" id="item_qty" min="1" value="1">
        </div>

        <div class="field">
          <label>商品原幣單價</label>
          <input type="number" id="unit_price_original" step="0.01" value="0">
        </div>

        <div class="field">
          <label>商品售價（可手動修改，留空則抓商品原售價）</label>
          <input type="number" id="sale_price_override" step="0.01" placeholder="可不填">
        </div>

        <div class="field">
          <label>單件二補費用</label>
          <input type="number" id="second_payment_fee" step="0.01" value="0" placeholder="手動填寫單件二補金額">
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title">重量與運費</div>
      <div class="form-grid-4">
        <div class="field">
          <label>單件重量</label>
          <input type="number" id="unit_weight" step="0.001" value="0" placeholder="例如：0.35">
        </div>

     
        <div class="field">
          <label>批次總重量</label>
          <input type="number" id="batch_total_weight" step="0.001" value="0" readonly>
        </div>

        <div class="field">
          <label>國際運費（自動計算）</label>
          <input type="number" id="estimated_international_shipping" step="0.01" value="0" readonly>
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title">備註</div>
      <div class="form-grid">
        <div class="field full">
          <label>備註</label>
          <input type="text" id="item_note" placeholder="可不填">
        </div>
      </div>
    </div>

    <div class="form-actions">
      <button type="button" class="btn-primary" onclick="saveBatchItem()">加入商品</button>
    </div>
  </div>
 </div>
  <!-- 批次列表 -->
  <div class="card">
  <h2>批次列表</h2>
  <div id="batch_count_text" class="batch-count-text">目前建立筆數：0</div>

  <div class="settlement-toolbar">
      <div class="settlement-toolbar-row">
       <div class="batch-list-search-wrap">
  <input type="text" id="batch_search" placeholder="搜尋批次名稱 / 官方訂單編號 / 貨態編號" autocomplete="off">
  <div id="batch_search_dropdown" class="batch-search-dropdown"></div>
</div>

        <select id="stock_status_search">
          <option value="">全部入庫狀態</option>
          <option value="pending">未入庫</option>
          <option value="in_transit">運送中</option>
          <option value="arrived">已到貨未入庫</option>
          <option value="stocked">已入庫</option>
        </select>

        <select id="packed_status_search">
          <option value="">全部打包狀態</option>
          <option value="true">已打包回台</option>
          <option value="false">未打包回台</option>
        </select>

<select id="reward_used_search">
  <option value="">全部回饋抵用</option>
  <option value="true">已抵用</option>
  <option value="false">未抵用</option>
</select>

      <select id="creator_search">
  <option value="">全部建立者</option>
  <option value="fa754f11-9a7e-4ced-8cbb-da30f01292e0">只看青</option>
  <option value="6dfc15fc-dacc-4515-ae56-49a8722fe534">只看媛媛</option>
</select>
        



      </div>



      <div class="settlement-toolbar-row settlement-toolbar-row-bottom">
        <div class="date-range-group">
          <div class="date-range-label">開始時間 - 結束時間</div>
          <div class="date-range-inputs">
            <input type="date" id="batch_date_start">
            <input type="date" id="batch_date_end">
          </div>
        </div>

        <button type="button" class="btn-secondary" onclick="exportSettlementCsv()">匯出 CSV</button>
      </div>
    </div>

    <div id="settlement_overview" class="settlement-overview"></div>
    <div id="batch_list"></div>
  </div>

  <footer class="site-footer">2025 © ThaiBuy代購</footer>
</div>

<script type="module" src="../js/admin-settlement.js"></script>
</body>
</html>
