<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>訂單管理</title>
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/admin-orders.css">
</head>

<body>

<div class="topbar">
  <div class="topbar-left">
    <img src="../LOGO.png" class="brand-logo" alt="THAI BUY logo">
    <div>
      <div class="brand-title">THAI BUY</div>
      <div class="brand-subtitle">可愛又安心的泰國代購</div>
    </div>
  </div>

 <div class="topbar-nav">
    <a href="./admin-orders.html" class="topbar-link active">訂單管理</a>
    <a href="./admin-product-stats.html" class="topbar-link">商品統計</a>
    <a href="./admin-products.html" class="topbar-link">商品管理</a>
    <a href="./admin-tracking.html" class="topbar-link">貨態管理</a>
    <a href="./admin-711.html" class="topbar-link">賣貨便管理</a>
    <a href="./admin-settlement.html" class="topbar-link">帳務管理</a>
    <a href="./admin-expenses.html" class="topbar-link">內帳支出</a>
    <a href="./admin-wallet.html" class="topbar-link">儲值金管理</a>
    <a href="./admin-711-income.html" class="topbar-link">7-11入帳</a>
    <a href="./admin-self-usage.html" class="topbar-link">自用紀錄</a>
  </div>
</div>

<div class="container">

  <div style="display:flex;justify-content:space-between;align-items:center;">
    <h2>訂單管理</h2>
  
    <div id="userBox" style="display:flex;align-items:center;gap:10px;font-size:14px;color:#374151;">
  <span id="currentUser">👤 ...</span>
  <button id="logoutBtn" type="button">登出</button>
</div>
  </div>
<div class="order-toolbar">
  <div class="order-toolbar-row">
    <input
      id="searchInput"
      class="toolbar-input"
      type="text"
      placeholder="搜尋 訂單編號 / ID / 姓名 / 電話 / Email"
      oninput="loadOrders()"
    >

    <select
      id="statusFilter"
      class="toolbar-select"
      onchange="loadOrders()"
    >
      <option value="all">全部狀態</option>
      <option value="new">只看新訂單</option>
      <option value="collecting">只看等待回台</option>
      <option value="shipping">只看等待出貨</option>
      <option value="done">只看已完成</option>
      <option value="cancelled">只看已取消</option>
    </select>

    <select
      id="adminStatusFilter"
      class="toolbar-select"
      onchange="loadOrders()"
    >
      <option value="all">全部管理狀態</option>
      <option value="unset">未設定</option>
      <option value="checking">等待對帳</option>
      <option value="paid">對帳完成</option>
      <option value="hold">暫停處理</option>
    </select>

    <button
      type="button"
      onclick="loadOrders()"
      class="toolbar-btn toolbar-btn-secondary"
    >
      搜尋
    </button>

    <button
      type="button"
      onclick="exportShippingList()"
      class="toolbar-btn toolbar-btn-primary"
    >
      匯出待出貨清單
    </button>
  </div>
</div>

<!-- ⭐ 新訂單 -->
<h3 class="section-title">
  🆕 新訂單
  <span id="count-new" class="order-count-badge">0</span>
</h3>
<div id="order-new"></div>

<h3 class="section-title">
  📦 等待回台
  <span id="count-collecting" class="order-count-badge">0</span>
</h3>
<div id="order-collecting"></div>

<h3 class="section-title">
  🚚 等待運送中
  <span id="count-shipping" class="order-count-badge">0</span>
</h3>
<div id="order-shipping"></div>

<h3 class="section-title">
  ✅ 寄送完成
  <span id="count-done" class="order-count-badge">0</span>
</h3>
<div id="order-done"></div>

</div>
<footer class="site-footer">2025 © ThaiBuy代購</footer>
<script type="module" src="../js/admin-orders.js"></script>

</body>
</html>
